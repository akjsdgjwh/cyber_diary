<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사이버 다꾸 </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Pen+Script&family=Jua&family=Do+Hyeon&family=Nanum+Myeongjo:wght@400;700&family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --accent:#ff6fa5; --accent-soft:#ffe1ee; --accent2:#8b7fd9;
    --card:#ffffff; --text:#3a3247; --muted:#948da3; --border:#e9e2f0;
    --soft:#faf7fc; --bg1:#fdf2f8; --bg2:#f2f0fb; --bg3:#eef7fb; --shadow:139,127,217;
  }
  html[data-theme="blackred"]{
    --accent:#ff3b47; --accent-soft:#3a1418; --accent2:#ff7a7a;
    --card:#1c1414; --text:#f2dede; --muted:#b08c8c; --border:#3a2424;
    --soft:#241818; --bg1:#150909; --bg2:#1c0e0e; --bg3:#0d0606; --shadow:0,0,0;
  }
  html[data-theme="darkmono"]{
    --accent:#e6e6e6; --accent-soft:#3a3a3a; --accent2:#9d9d9d;
    --card:#1b1b1b; --text:#eaeaea; --muted:#8f8f8f; --border:#333333;
    --soft:#242424; --bg1:#0e0e0e; --bg2:#161616; --bg3:#0b0b0b; --shadow:0,0,0;
  }
  html[data-theme="mint"]{
    --accent:#12b886; --accent-soft:#d3f9ec; --accent2:#4dabf7;
    --card:#ffffff; --text:#1b2a2f; --muted:#7c9a95; --border:#d7ede7;
    --soft:#eef9f5; --bg1:#eafaf5; --bg2:#eaf4fb; --bg3:#f7fdfb; --shadow:60,140,120;
  }
  html[data-theme="blackblue"]{
    --accent:#4d9dff; --accent-soft:#132437; --accent2:#7ec4ff;
    --card:#12161c; --text:#dce8f5; --muted:#87a0b8; --border:#232c38;
    --soft:#1a212b; --bg1:#0a0d12; --bg2:#10151d; --bg3:#080a0e; --shadow:0,0,0;
  }
  html[data-theme="whiteyellow"]{
    --accent:#f5b400; --accent-soft:#fff3d0; --accent2:#ff9f1c;
    --card:#ffffff; --text:#3a3020; --muted:#a89b6e; --border:#f2e3ae;
    --soft:#fffbef; --bg1:#fffaea; --bg2:#fff6db; --bg3:#fffdf5; --shadow:200,160,20;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0;}
  body{
    font-family:'Noto Sans KR', sans-serif;
    background:linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
    color:var(--text); min-height:100vh; padding:20px 20px 60px 92px;
    transition:background .2s, color .2s;
  }
  .app{max-width:1320px; margin:0 auto;}
  h1{font-size:22px; font-weight:700; margin:0 0 14px; display:flex; align-items:center; gap:8px;}
  h1 .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);display:inline-block;}
  .panel{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px 16px; margin-bottom:14px; box-shadow:0 2px 10px rgba(var(--shadow),0.06);}
  .row{display:flex; flex-wrap:wrap; gap:8px; align-items:center;}
  .row + .row{margin-top:10px;}
  .divider{width:1px;height:22px;background:var(--border);margin:0 4px;}
  button{font-family:inherit; border:1px solid var(--border); background:var(--card); color:var(--text); border-radius:10px; padding:8px 14px; font-size:13px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:background .12s, transform .1s, border-color .12s;}
  button:hover{background:var(--soft); border-color:var(--accent2);}
  button:active{transform:scale(0.97);}
  button.active{background:var(--accent); border-color:var(--accent); color:#fff;}
  button.danger:hover{border-color:#e0607a;}
  button:disabled{opacity:0.4; cursor:default;}
  button:disabled:hover{background:var(--card); border-color:var(--border);}
  .icon-btn{width:38px; height:38px; padding:0; justify-content:center; font-size:16px; flex-shrink:0;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; font-size:20px; line-height:1; vertical-align:-4px; user-select:none;}
  button.active .material-symbols-outlined{font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 24;}
  .layer-btns .material-symbols-outlined, .layer-drag-handle .material-symbols-outlined{font-size:15px; vertical-align:-3px;}
  .seg-group{display:inline-flex; border:1px solid var(--border); border-radius:10px; overflow:hidden;}
  .seg-group .icon-btn{border:none; border-radius:0; border-right:1px solid var(--border);}
  .seg-group .icon-btn:last-child{border-right:none;}
  .seg-group.vertical{flex-direction:column;}
  .seg-group.vertical .icon-btn{border-right:none; border-bottom:1px solid var(--border);}
  .seg-group.vertical .icon-btn:last-child{border-bottom:none;}
  .left-toolbar{
    position:fixed; left:16px; top:120px; z-index:20;
    display:flex; flex-direction:column; gap:6px; align-items:center;
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:8px; box-shadow:0 6px 20px rgba(var(--shadow),0.14);
  }
  .divider-h{width:26px; height:1px; background:var(--border); margin:2px 0;}
  @media (max-width:680px){
    body{padding-left:20px;}
    .left-toolbar{position:static; flex-direction:row; flex-wrap:wrap; width:fit-content; margin:0 0 14px;}
    .seg-group.vertical{flex-direction:row;}
    .seg-group.vertical .icon-btn{border-bottom:none; border-right:1px solid var(--border);}
    .seg-group.vertical .icon-btn:last-child{border-right:none;}
    .divider-h{width:1px; height:26px; margin:0 2px;}
  }
  select, input[type=color], input[type=range], input[type=text]{font-family:inherit; font-size:13px; border:1px solid var(--border); border-radius:9px; padding:6px 8px; background:var(--card); color:var(--text);}
  input[type=color]{width:34px; height:34px; padding:2px; cursor:pointer;}
  input[type=range]{padding:0; cursor:pointer;}
  .sticker-panel, .photo-panel{display:none;}
  .layer-panel{
    position:fixed; top:120px; right:24px; width:340px; height:420px; min-width:260px; min-height:220px;
    max-width:90vw; max-height:85vh; z-index:30;
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    box-shadow:0 10px 30px rgba(var(--shadow),0.22); overflow:hidden;
    display:flex; flex-direction:column;
  }
  .layer-panel-header{
    display:flex; align-items:center; gap:6px; padding:10px 12px;
    border-bottom:1px solid var(--border); cursor:grab; touch-action:none; user-select:none;
    background:var(--soft); border-radius:14px 14px 0 0; flex-shrink:0;
  }
  .layer-panel-title{font-size:13px; font-weight:700; flex:1;}
  .layer-panel-body{padding:12px; overflow-y:auto; flex:1; min-height:0;}
  .layer-panel-resize{
    position:absolute; right:0; bottom:0; width:22px; height:22px;
    display:flex; align-items:flex-end; justify-content:flex-end; padding:2px;
    cursor:nwse-resize; touch-action:none; color:var(--muted);
  }
  .layer-panel-resize .material-symbols-outlined{font-size:16px; transform:rotate(45deg);}
  .color-picker-swatch{width:30px; height:30px; border-radius:7px; border:1px solid var(--border); cursor:pointer; display:inline-block; vertical-align:middle; flex-shrink:0; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.4);}
  .color-picker-popover{position:fixed; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; box-shadow:0 10px 28px rgba(var(--shadow),0.25); z-index:300; display:flex; flex-direction:column; gap:10px; width:190px;}
  .color-picker-sv-wrap{position:relative; line-height:0;}
  .color-picker-sv{border-radius:8px; display:block; touch-action:none; cursor:crosshair; width:100%; height:150px;}
  .color-picker-sv-cursor{position:absolute; width:14px; height:14px; border:2px solid #fff; border-radius:50%; box-shadow:0 0 3px rgba(0,0,0,0.7), inset 0 0 1px rgba(0,0,0,0.4); transform:translate(-50%,-50%); pointer-events:none;}
  .color-picker-hue{position:relative; height:16px; border-radius:8px; background:linear-gradient(to right, red,yellow,lime,cyan,blue,magenta,red); touch-action:none; cursor:pointer;}
  .color-picker-hue-cursor{position:absolute; top:-2px; width:16px; height:20px; border:2px solid #fff; border-radius:5px; box-shadow:0 0 3px rgba(0,0,0,0.7); transform:translateX(-50%); pointer-events:none; box-sizing:border-box;}
  .color-picker-hex-row{display:flex; align-items:center; gap:6px;}
  .color-picker-hex-row input{flex:1; min-width:0; font-size:13px; padding:4px 6px; border:1px solid var(--border); border-radius:6px; font-family:monospace;}
  .color-picker-swatches{display:grid; grid-template-columns:repeat(8, 1fr); gap:4px;}
  .color-picker-swatches button{width:100%; aspect-ratio:1; border-radius:5px; border:1px solid var(--border); padding:0; cursor:pointer; min-height:0;}
  .cat-tabs{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;}
  .cat-tabs button{padding:5px 12px; font-size:12px;}
  .sticker-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(42px,1fr)); gap:2px; max-height:130px; overflow-y:auto; background:var(--soft); border-radius:10px; padding:6px;}
  .sticker-grid button{border:none; background:transparent; font-size:24px; padding:4px; border-radius:8px;}
  .sticker-grid button:hover{background:var(--accent-soft);}
  #layerList{display:flex; flex-direction:column; gap:3px; margin-top:8px;}
  .layer-row{display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:8px; cursor:pointer;}
  .layer-row.locked{opacity:0.55; cursor:default;}
  .layer-row.locked .layer-thumb, .layer-row.locked .layer-name{filter:grayscale(0.3);}
  .layer-row:hover{background:var(--soft);}
  .layer-row.active{background:var(--accent-soft);}
  .layer-row.multi-active{background:var(--accent-soft); box-shadow:inset 0 0 0 1.5px var(--accent2);}
  .layer-row.dragging{opacity:0.4;}
  .layer-row.drag-over{outline:2px dashed var(--accent2); outline-offset:-2px;}
  .layer-drag-handle{cursor:grab; color:var(--muted); font-size:14px; flex-shrink:0; touch-action:none;}
  .layer-thumb{width:26px;height:26px; display:flex; align-items:center; justify-content:center; font-size:15px; border-radius:6px; overflow:hidden; background:var(--soft); flex-shrink:0;}
  .layer-thumb img{width:100%;height:100%;object-fit:cover;}
  .layer-name{flex:1; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .layer-btns{display:flex; gap:2px;}
  .layer-btns button{width:24px; height:24px; padding:0; font-size:11px; justify-content:center;}
  .canvas-wrapper{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px; display:flex; justify-content:center; overflow-x:auto; box-shadow:0 4px 18px rgba(var(--shadow),0.08);}
  .canvas-scaler{position:relative;}
  #pageStage{position:relative; transform-origin:top left; border-radius:8px; overflow:hidden; box-shadow:0 6px 24px rgba(var(--shadow),0.28); background:#fff;}
  #bgPattern{position:absolute; inset:0;}
  #elementsLayer{position:absolute; inset:0;}
  .ink-canvas{position:absolute; inset:0; touch-action:none;}
  #foldShade{position:absolute; top:0; bottom:0; pointer-events:none;}
  .el-box{position:absolute; user-select:none; touch-action:none; cursor:grab;}
  .el-box.selected{outline:1.5px dashed var(--accent2); outline-offset:6px;}
  .el-box.multi-selected{outline:2px solid var(--accent2); outline-offset:4px;}
  .ink-content-outline{position:absolute; border:1.5px dashed var(--accent2); border-radius:6px; pointer-events:none;}
  .el-sticker-content{font-size:56px; line-height:1; display:block;}
  .el-text{min-width:30px; min-height:1.3em; padding:2px 6px; white-space:pre; outline:none; display:inline-block;}
  .el-photo-wrap img{display:block; -webkit-user-drag:none;}
  .frame-white{background:#fff; padding:10px; display:inline-block;}
  .frame-polaroid{background:#fff; padding:10px 10px 34px 10px; display:inline-block;}
  .frame-color{background:transparent; display:inline-block;}
  .has-shadow{box-shadow:0 4px 10px rgba(0,0,0,0.18);}
  .el-shape-content{box-sizing:border-box; display:block;}
  #selPanel{display:block; margin-top:12px; min-height:68px;}
  .ink-hint{font-size:12px; color:var(--muted);}
  .page-nav{display:flex; align-items:center; justify-content:center; gap:10px; margin-top:14px;}
  #pageIndicator{font-size:13px; color:var(--muted); min-width:110px; text-align:center;}
  .handle{position:absolute; width:14px; height:14px; background:#fff; border:2px solid var(--accent2); border-radius:50%; transform:translate(-50%,-50%); touch-action:none;}
  .handle.corner-tl{top:0; left:0; cursor:nwse-resize;}
  .handle.corner-tr{top:0; left:100%; cursor:nesw-resize;}
  .handle.corner-bl{top:100%; left:0; cursor:nesw-resize;}
  .handle.corner-br{top:100%; left:100%; cursor:nwse-resize;}
  .handle.rotate-handle{top:-30px; left:50%; background:var(--accent); border-color:var(--accent); cursor:grab;}
  .crop-handle{position:absolute; width:16px; height:16px; background:#fff; border:2px solid var(--accent2); border-radius:50%; touch-action:none;}
  .crop-handle[data-corner="tl"]{top:0; left:0; transform:translate(-50%,-50%); cursor:nwse-resize;}
  .crop-handle[data-corner="tr"]{top:0; left:100%; transform:translate(-50%,-50%); cursor:nesw-resize;}
  .crop-handle[data-corner="bl"]{top:100%; left:0; transform:translate(-50%,-50%); cursor:nesw-resize;}
  .crop-handle[data-corner="br"]{top:100%; left:100%; transform:translate(-50%,-50%); cursor:nwse-resize;}
  .rotate-line{position:absolute; top:-30px; left:50%; width:1px; height:30px; background:var(--accent2); transform:translateX(-50%); pointer-events:none;}
  .ink-rotate-line.rotate-line{top:50%; left:50%; height:70px; transform:translate(-50%,-100%); pointer-events:none;}
  .handle.rotate-handle.ink-rotate-handle{top:50%; left:50%; transform:translate(-50%,-70px);}
</style>
</head>
<body>
<div class="app">
  <h1><span class="dot"></span>사이버 다꾸
    <select id="themeSelect" title="화면 테마" aria-label="화면 테마" style="margin-left:auto; font-size:12px;">
      <option value="pink">핑크 파스텔</option>
      <option value="blackred">블랙 레드</option>
      <option value="darkmono">다크 모노</option>
      <option value="mint">민트</option>
      <option value="blackblue">블랙 블루</option>
      <option value="whiteyellow">화이트 옐로우</option>
    </select>
  </h1>

  <div class="panel">
    <div class="row">
      <span id="bgColorInputSlot"></span>
      <select id="patternSelect" title="속지 패턴" aria-label="속지 패턴">
        <option value="blank">무지</option>
        <option value="lined">줄노트</option>
        <option value="grid">격자</option>
        <option value="dot">도트</option>
      </select>
      <span class="divider"></span>
      <button id="addPageBtn" class="icon-btn" title="새 스프레드 추가" aria-label="새 스프레드 추가"><span class="material-symbols-outlined">add</span></button>
      <button id="delPageBtn" class="icon-btn danger" title="스프레드 삭제" aria-label="스프레드 삭제"><span class="material-symbols-outlined">delete</span></button>
      <span class="divider"></span>
      <button id="undoBtn" class="icon-btn" title="실행 취소 (Ctrl+Z)" aria-label="실행 취소"><span class="material-symbols-outlined">undo</span></button>
      <button id="redoBtn" class="icon-btn" title="다시 실행 (Ctrl+Shift+Z)" aria-label="다시 실행"><span class="material-symbols-outlined">redo</span></button>
      <span class="divider"></span>
      <select id="exportFormatSelect" title="저장 형식" aria-label="저장 형식" style="font-size:12px;">
        <option value="png">PNG</option>
        <option value="gif">GIF</option>
      </select>
      <button id="downloadBtn" class="icon-btn" title="이미지로 저장" aria-label="이미지로 저장"><span class="material-symbols-outlined">download</span></button>
      <button id="saveProjectBtn" class="icon-btn" title="프로젝트 파일로 저장" aria-label="프로젝트 파일로 저장"><span class="material-symbols-outlined">save</span></button>
      <button id="loadProjectBtn" class="icon-btn" title="프로젝트 파일 열기" aria-label="프로젝트 파일 열기"><span class="material-symbols-outlined">folder_open</span></button>
      <input type="file" id="projectFileInput" accept=".json,application/json" style="display:none;">
      <span class="divider"></span>
      <div id="drawOptions" style="display:flex; align-items:center; gap:8px;">
        <div class="seg-group" id="eraserTypeGroup">
          <button id="eraserPixelBtn" class="icon-btn" title="일반 지우개 (부분만 지우기)" aria-label="일반 지우개"><span class="material-symbols-outlined">ink_eraser</span></button>
          <button id="eraserStrokeBtn" class="icon-btn active" title="획 지우개 (선 전체 삭제)" aria-label="획 지우개"><span class="material-symbols-outlined">layers_clear</span></button>
        </div>
        <span id="drawColorInputSlot"></span>
        <input type="range" id="drawWidthInput" min="1" max="30" value="4" style="width:90px;" title="굵기" aria-label="굵기">
        <button id="clearInkBtn" class="icon-btn" title="현재 그림 레이어 지우기" aria-label="현재 그림 레이어 지우기"><span class="material-symbols-outlined">delete_sweep</span></button>
        <button id="togglePressureCurveBtn" class="icon-btn" title="필압 곡선 설정" aria-label="필압 곡선 설정"><span class="material-symbols-outlined">tune</span></button>
      </div>
    </div>
    <div class="row" id="pressureCurvePanel" style="display:none;">
      <svg id="pressureCurveGraph" width="220" height="140" viewBox="0 0 220 140" style="background:var(--soft); border-radius:10px;"></svg>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <span class="ink-hint">가로: 누르는 세기(약함→강함) / 세로: 선 굵기(얇음→굵음)<br>점을 위아래로 드래그해서 곡선을 원하는 대로 바꿀 수 있어요.</span>
        <div class="row">
          <button id="invertCurveBtn"><span class="material-symbols-outlined">swap_vert</span> 반전</button>
          <button id="resetCurveBtn"><span class="material-symbols-outlined">restart_alt</span> 초기화</button>
        </div>
      </div>
    </div>
  </div>

  <div class="left-toolbar">
    <div class="seg-group vertical">
      <button id="modeSelectBtn" class="icon-btn active" title="이동 / 선택" aria-label="이동"><span class="material-symbols-outlined">pan_tool</span></button>
      <button id="modePenBtn" class="icon-btn" title="펜 (필압+속도 반영)" aria-label="펜"><span class="material-symbols-outlined">ink_pen</span></button>
      <button id="modeHiBtn" class="icon-btn" title="형광펜" aria-label="형광펜"><span class="material-symbols-outlined">ink_highlighter</span></button>
      <button id="modeEraserBtn" class="icon-btn" title="지우개" aria-label="지우개"><span class="material-symbols-outlined">ink_eraser</span></button>
    </div>
    <span class="divider-h"></span>
    <button id="toggleStickerBtn" class="icon-btn" title="스티커" aria-label="스티커"><span class="material-symbols-outlined">dialogs</span></button>
    <button id="addPhotoBtn" class="icon-btn" title="사진 (내 파일)" aria-label="사진"><span class="material-symbols-outlined">add_photo_alternate</span></button>
    <input type="file" id="photoInput" accept="image/*" style="display:none;">
    <button id="addTextBtn" class="icon-btn" title="텍스트 추가" aria-label="텍스트 추가"><span class="material-symbols-outlined">text_fields</span></button>
    <button id="addShapeBtn" class="icon-btn" title="도형 추가" aria-label="도형 추가"><span class="material-symbols-outlined">category</span></button>
    <span class="divider-h"></span>
    <button id="toggleLayerBtn" class="icon-btn" title="레이어" aria-label="레이어"><span class="material-symbols-outlined">layers</span></button>
  </div>

  <div class="panel sticker-panel" id="stickerPanel">
    <div class="row" style="margin-bottom:8px;">
      <input type="text" id="customEmojiInput" placeholder="원하는 이모지 붙여넣기/입력 (Win: ⊞+. / Mac: ⌃⌘Space)" maxlength="8" style="flex:1; min-width:200px;">
      <button id="addCustomEmojiBtn">추가</button>
    </div>
    <div class="cat-tabs" id="categoryTabs"></div>
    <div class="sticker-grid" id="stickerGrid"></div>
  </div>

  <div class="panel photo-panel" id="photoPanel">

(function(){
  var STORAGE_KEY = 'cyberDiaryAppState_v1';
  var THEME_KEY = 'cyberDiaryTheme_v1';
  var PAGE_W = 1588, PAGE_H = 1123, HALF = PAGE_W / 2;

  // ---------- IndexedDB (much larger storage ceiling than localStorage, used for
  // autosave and the persistent image library so users don't hit a small quota) ----------
  var IDB_NAME = 'cyberDiaryDB';
  var IDB_VERSION = 1;
  var idbPromise = null;
  function openIDB(){
    if(idbPromise) return idbPromise;
    idbPromise = new Promise(function(resolve, reject){
      if(!window.indexedDB){ reject(new Error('IndexedDB unavailable')); return; }
      var req = indexedDB.open(IDB_NAME, IDB_VERSION);
      req.onupgradeneeded = function(e){
        var db = e.target.result;
        if(!db.objectStoreNames.contains('state')) db.createObjectStore('state');
        if(!db.objectStoreNames.contains('media')) db.createObjectStore('media');
      };
      req.onsuccess = function(e){ resolve(e.target.result); };
      req.onerror = function(e){ reject(e); };
    });
    return idbPromise;
  }
  function idbSet(storeName, key, value){
    return openIDB().then(function(db){
      return new Promise(function(resolve, reject){
        var tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).put(value, key);
        tx.oncomplete = function(){ resolve(); };
        tx.onerror = function(e){ reject(e); };
      });
    });
  }
  function idbGet(storeName, key){
    return openIDB().then(function(db){
      return new Promise(function(resolve, reject){
        var tx = db.transaction(storeName, 'readonly');
        var req = tx.objectStore(storeName).get(key);
        req.onsuccess = function(){ resolve(req.result); };
        req.onerror = function(e){ reject(e); };
      });
    });
  }
  function idbGetAllKeys(storeName){
    return openIDB().then(function(db){
      return new Promise(function(resolve, reject){
        var tx = db.transaction(storeName, 'readonly');
        var req = tx.objectStore(storeName).getAllKeys();
        req.onsuccess = function(){ resolve(req.result); };
        req.onerror = function(e){ reject(e); };
      });
    });
  }
  function idbDelete(storeName, key){
    return openIDB().then(function(db){
      return new Promise(function(resolve, reject){
        var tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).delete(key);
        tx.oncomplete = function(){ resolve(); };
        tx.onerror = function(e){ reject(e); };
      });
    });
  }

  // ---------- ink layers ----------
  function pageToLayerLocal(p, layer){
    var rot = -(layer.rotation || 0) * Math.PI / 180;
    var lx0 = layer.x != null ? layer.x : PAGE_W/2;
    var ly0 = layer.y != null ? layer.y : PAGE_H/2;
    var dx = p.x - lx0, dy = p.y - ly0;
    var lx = dx*Math.cos(rot) - dy*Math.sin(rot);
    var ly = dx*Math.sin(rot) + dy*Math.cos(rot);
    return { x: lx + PAGE_W/2, y: ly + PAGE_H/2, pressure: p.pressure, t: p.t };
  }
  function makeInkLayer(){
    var layer = {id: idCounter++, type:'ink', x: PAGE_W/2, y: PAGE_H/2, rotation: 0, strokes: []};
    var c = document.createElement('canvas');
    c.width = PAGE_W; c.height = PAGE_H;
    c.className = 'ink-canvas';
    c.style.pointerEvents = 'none';
    layer.canvas = c;
    layer.ctx = c.getContext('2d', {willReadFrequently: true});
    c.addEventListener('pointerdown', function(e){
      if(mode === 'select') return;
      c.setPointerCapture(e.pointerId);
      if(mode === 'eraser' && eraserSubMode === 'stroke'){
        isDrawing = true; activeStrokeLayer = layer;
        eraseStrokesNear(layer, pageToLayerLocal(pointFromEvent(e), layer));
        return;
      }
      beginStroke(layer, pageToLayerLocal(pointFromEvent(e), layer));
    });
    c.addEventListener('pointermove', function(e){
      if(!isDrawing || activeStrokeLayer !== layer) return;
      if(mode === 'eraser' && eraserSubMode === 'stroke'){
        if(e.getCoalescedEvents){
          var seEvs = e.getCoalescedEvents();
          if(seEvs.length){ seEvs.forEach(function(ce){ eraseStrokesNear(layer, pageToLayerLocal(pointFromEvent(ce), layer)); }); return; }
        }
        eraseStrokesNear(layer, pageToLayerLocal(pointFromEvent(e), layer));
        return;
      }
      if(e.getCoalescedEvents){
        var evs = e.getCoalescedEvents();
        if(evs.length){ evs.forEach(function(ce){ extendStroke(pageToLayerLocal(pointFromEvent(ce), layer)); }); return; }
      }
      extendStroke(pageToLayerLocal(pointFromEvent(e), layer));
    });
    function up(){
      if(activeStrokeLayer !== layer) return;
      if(mode === 'eraser' && eraserSubMode === 'stroke'){ isDrawing = false; activeStrokeLayer = null; commit(); }
      else { endStroke(); }
    }
    c.addEventListener('pointerup', up);
    c.addEventListener('pointercancel', up);
    c.addEventListener('pointerleave', up);
    return layer;
  }
  function peekActiveInkLayer(){
    var found = curPage().elements.filter(function(e){ return e.type === 'ink' && e.id === selectedId && !e.locked; })[0];
    if(found) return found;
    var inks = curPage().elements.filter(function(e){ return e.type === 'ink' && !e.locked; });
    return inks.length ? inks[inks.length - 1] : null;
  }
  function getActiveInkLayerCreating(){
    var found = peekActiveInkLayer();
    if(found) return found;
    var created = makeInkLayer();
    curPage().elements.push(created);
    return created;
  }
  function addInkLayer(){
    var layer = makeInkLayer();
    curPage().elements.push(layer);
    selectedId = layer.id;
    renderElements(); renderSelPanel(); renderLayerPanel();
    commit();
  }

  function updateScale(){

    stage.style.transform = 'scale(' + s + ')';
    canvasScaler.style.width = (PAGE_W * s) + 'px';
    canvasScaler.style.height = (PAGE_H * s) + 'px';

  }
  window.addEventListener('resize', updateScale);

  function toInternal(cx, cy){

  // ---------- background pattern ----------
  function renderPattern(){
    var p = curPage();
    bgPattern.innerHTML = '';
    bgPattern.style.background = p.bg;
    var ns = 'http://www.w3.org/2000/svg';
    [0, HALF].forEach(function(ox){
      var innerW = HALF;
      if(p.pattern === 'lined'){
        for(var y=64;y<PAGE_H-30;y+=42){

  // ---------- cached cutout (traced-outline) canvas for transparent photos ----------
  function getDecorCanvas(el){
    var img = decorImageObjs[el.imgKey];
    var imgReady = !!(img && img.complete && img.naturalWidth > 0);
    var outlineWidth = el.outlineWidth || 0;
    var key = el.imgKey + '|' + el.color + '|' + el.w + '|' + el.h + '|' + outlineWidth + '|' + el.outlineColor;
    if(imgReady && el._decorKey === key && el._decorCanvas) return el._decorCanvas;
    var pad = Math.ceil(Math.max(0, outlineWidth));
    var canvas = document.createElement('canvas');
    canvas.width = el.w + pad*2; canvas.height = el.h + pad*2;
    var ctx = canvas.getContext('2d');
    if(imgReady){
      if(pad > 0){
        var sil = document.createElement('canvas'); sil.width = el.w; sil.height = el.h;
        var sctx = sil.getContext('2d');
        sctx.drawImage(img, 0, 0, el.w, el.h);
        sctx.globalCompositeOperation = 'source-in';
        sctx.fillStyle = el.outlineColor || '#FFFFFF';
        sctx.fillRect(0, 0, el.w, el.h);
        var radiusStep = Math.max(1, Math.round(pad / 6));
        function stepsForRadius(rr){ return Math.max(16, Math.ceil((2 * Math.PI * rr) / 2)); }
        for(var rr = radiusStep; rr <= pad; rr += radiusStep){
          var stepsHere = stepsForRadius(rr);
          for(var a = 0; a < stepsHere; a++){
            var theta = (a/stepsHere) * Math.PI * 2;
            ctx.drawImage(sil, pad + Math.cos(theta)*rr, pad + Math.sin(theta)*rr);
          }
        }
        var outerSteps = stepsForRadius(pad);
        for(var a2 = 0; a2 < outerSteps; a2++){
          var theta2 = (a2/outerSteps) * Math.PI * 2;
          ctx.drawImage(sil, pad + Math.cos(theta2)*pad, pad + Math.sin(theta2)*pad);
        }
      }
      var mainCanvas = document.createElement('canvas');
      mainCanvas.width = el.w; mainCanvas.height = el.h;
      var mctx = mainCanvas.getContext('2d');
      mctx.fillStyle = el.color || '#9AA0A6';
      mctx.fillRect(0, 0, el.w, el.h);
      mctx.globalCompositeOperation = 'multiply';
      mctx.drawImage(img, 0, 0, el.w, el.h);
      mctx.globalCompositeOperation = 'destination-in';
      mctx.drawImage(img, 0, 0, el.w, el.h);
      ctx.drawImage(mainCanvas, pad, pad);
    }
    canvas.style.margin = pad > 0 ? (-pad) + 'px' : '0';
    if(imgReady){
      el._decorKey = key;
      el._decorCanvas = canvas;
    } else {
      el._decorKey = null;
      el._decorCanvas = null;
    }
    return canvas;
  }
  function getCutoutCanvas(el, forcePad){
    var srcImg = el.imgObj;
    var imgReady = !!(srcImg && srcImg.complete && srcImg.naturalWidth > 0);
    var effFrameWidth = forcePad != null ? forcePad : el.frameWidth;
    var key = (forcePad != null ? 'noborder' : el.frameColor) + '|' + effFrameWidth + '|' + el.w + '|' + el.h + '|' + (el.shadow ? 1 : 0);
    if(imgReady && el._cutoutKey === key && el._cutoutCanvas) return el._cutoutCanvas;
    var pad = Math.ceil(Math.max(0, effFrameWidth));
    var cw = el.w + pad*2, ch = el.h + pad*2;
    var composite = document.createElement('canvas');
    composite.width = cw; composite.height = ch;
    var cctx = composite.getContext('2d', {willReadFrequently: true});
    if(imgReady && pad > 0){
      var sil = document.createElement('canvas'); sil.width = el.w; sil.height = el.h;
      var sctx = sil.getContext('2d');
      sctx.drawImage(srcImg, 0, 0, el.w, el.h);
      sctx.globalCompositeOperation = 'source-in';
      sctx.fillStyle = el.frameColor;
      sctx.fillRect(0, 0, el.w, el.h);
      var radiusStep = Math.max(1, Math.round(pad / 6));
      function stepsForRadius(rr){ return Math.max(16, Math.ceil((2 * Math.PI * rr) / 2)); }
      for(var rr = radiusStep; rr <= pad; rr += radiusStep){
        var stepsHere = stepsForRadius(rr);
        for(var a = 0; a < stepsHere; a++){
          var theta = (a/stepsHere) * Math.PI * 2;
          cctx.drawImage(sil, pad + Math.cos(theta)*rr, pad + Math.sin(theta)*rr);
        }
      }
      var outerSteps = stepsForRadius(pad);
      for(var a2 = 0; a2 < outerSteps; a2++){
        var theta2 = (a2/outerSteps) * Math.PI * 2;
        cctx.drawImage(sil, pad + Math.cos(theta2)*pad, pad + Math.sin(theta2)*pad);

      cctx.drawImage(srcImg, pad, pad, el.w, el.h);

    if(imgReady && el.shadow){
      var shadowMargin = 16 + pad;
      canvas = document.createElement('canvas');
      canvas.width = cw + shadowMargin*2;
      canvas.height = ch + shadowMargin*2;
      canvas.style.width = canvas.width + 'px';
      canvas.style.height = canvas.height + 'px';
      canvas.style.margin = (-shadowMargin) + 'px';
      var ctx = canvas.getContext('2d', {willReadFrequently: true});

      // the composite's actual (non-rectangular) alpha silhouette, not just its box
      ctx.shadowColor = 'rgba(0,0,0,0.28)';
      ctx.shadowBlur = 10;
      ctx.shadowOffsetY = 4;
      ctx.drawImage(composite, shadowMargin, shadowMargin);
    } else {
      canvas = composite;
      canvas.style.width = cw + 'px';
      canvas.style.height = ch + 'px';
      canvas.style.margin = '0';
    }
    if(imgReady){
      el._cutoutKey = key;
      el._cutoutCanvas = canvas;
    } else {
      // image not loaded yet — do NOT cache this blank result, or it would
      // stay blank forever even after the image finishes loading
      el._cutoutKey = null;
      el._cutoutCanvas = null;
    }
    return canvas;
  }

  function buildStarPatternDataUri(color){

      '<g fill="' + color + '">' +

  function applyShapeFill(node, el){
    var ps = el.patternSize || 1;
    if(el.fillType === 'solid'){ node.style.background = el.fillColor; return; }
    if(el.fillType === 'none'){ node.style.background = 'transparent'; return; }

      node.style.background = 'repeating-linear-gradient(45deg, ' + el.fillColor + ' 0 ' + w + 'px, ' + el.fillColor2 + ' ' + w + 'px ' + (w*2) + 'px)';
    } else if(el.fillType === 'dot'){
      node.style.backgroundColor = el.fillColor2;
      node.style.backgroundImage = 'radial-gradient(circle, ' + el.fillColor + ' ' + (4*ps) + 'px, transparent ' + (5*ps) + 'px)';
      node.style.backgroundSize = (20*ps) + 'px ' + (20*ps) + 'px';
    } else if(el.fillType === 'polka'){
      var r = 9*ps, size = 38*ps;
      node.style.backgroundColor = el.fillColor2;
      node.style.backgroundImage =

        'radial-gradient(circle, ' + el.fillColor + ' ' + r + 'px, transparent ' + (r+1) + 'px)';

      node.style.backgroundPosition = '0 0, ' + (size/2) + 'px ' + (size/2) + 'px';

  function buildTextOutlineShadow(width, color){
    var steps = Math.max(8, Math.min(28, Math.round(width * 3)));

      var theta = (i/steps) * Math.PI * 2;

      var dy = (Math.sin(theta)*width).toFixed(2);
      parts.push(dx + 'px ' + dy + 'px 0 ' + color);

  // ---------- elements ----------
  function renderElements(){
    elLayer.innerHTML = '';
    curPage().elements.forEach(function(el){
      var div = document.createElement('div');
      var showFullSelected = (el.id === selectedId) && el.type !== 'ink';
      var showMultiSelected = multiSelectIds.has(el.id) && el.type !== 'ink';
      div.className = 'el-box' + (showFullSelected ? ' selected' : '') + (showMultiSelected ? ' multi-selected' : '');
      div.dataset.id = el.id;
      div.style.left = el.x + 'px';
      div.style.top = el.y + 'px';
      div.style.transform = 'translate(-50%,-50%) rotate(' + el.rotation + 'deg)';
      var contentEl = null;

      if(el.type === 'ink'){
        contentEl = el.canvas;
        contentEl.style.position = 'static';
        div.appendChild(contentEl);
        div.style.pointerEvents = (el.id === selectedId) ? 'auto' : 'none';
        if(el.contentBBox){
          var bcx = (el.contentBBox.minX + el.contentBBox.maxX) / 2;
          var bcy = (el.contentBBox.minY + el.contentBBox.maxY) / 2;
          div.style.transformOrigin = (bcx / PAGE_W * 100) + '% ' + (bcy / PAGE_H * 100) + '%';
        } else {
          div.style.transformOrigin = '50% 50%';
        }
        if(el.id === selectedId && el.contentBBox){
          var bbox = el.contentBBox;
          var outlineDiv = document.createElement('div');
          outlineDiv.className = 'ink-content-outline';
          outlineDiv.style.left = bbox.minX + 'px';
          outlineDiv.style.top = bbox.minY + 'px';
          outlineDiv.style.width = (bbox.maxX - bbox.minX) + 'px';
          outlineDiv.style.height = (bbox.maxY - bbox.minY) + 'px';
          div.appendChild(outlineDiv);

        if(el.isDecor){

          contentEl.className = 'el-sticker-content';
          contentEl.style.fontSize = el.size + 'px';
          contentEl.textContent = el.emoji;
        }
        div.appendChild(contentEl);
      } else if(el.type === 'text'){
        contentEl = document.createElement('div');
        contentEl.className = 'el-text';
        var isEditing = (editingTextId === el.id);
        contentEl.contentEditable = isEditing ? 'true' : 'false';
        contentEl.style.cursor = isEditing ? 'text' : 'grab';
        contentEl.style.color = el.color;
        contentEl.style.fontSize = el.fontSize + 'px';
        contentEl.style.fontFamily = el.fontFamily;
        contentEl.style.fontWeight = el.bold ? '700' : '400';

        contentEl.style.letterSpacing = (el.letterSpacing || 0) + 'px';

        if(el.boxWidth){

          gifImg.style.height = el.h + 'px';

          gifImg.style.display = 'block';
          gifImg.draggable = false;

          img.style.width = el.w + 'px';
          img.style.height = el.h + 'px';

        if(el.kind === 'rect' || el.kind === 'ellipse'){

          contentEl.style.height = el.h + 'px';
          contentEl.style.borderRadius = el.kind === 'ellipse' ? '50%' : Math.min(el.radius, Math.min(el.w, el.h)/2) + 'px';
          contentEl.style.border = el.strokeWidth > 0 ? (el.strokeWidth + 'px solid ' + el.strokeColor) : 'none';

          var strokePadPx = el.strokeWidth > 0 ? Math.ceil(el.strokeWidth / 2) + 1 : 0;
          var svgW = el.w + strokePadPx * 2;
          var svgH = el.h + strokePadPx * 2;

          contentEl.setAttribute('preserveAspectRatio', 'none');
          contentEl.setAttribute('width', svgW);
          contentEl.setAttribute('height', svgH);
          contentEl.style.display = 'block';
          var pathEl = document.createElementNS(ns, 'path');
          pathEl.setAttribute('d', def.path);
          var patScale = el.patternSize || 1;
          var patSx = (vbW / el.w) * patScale;
          var patSy = (vbH / el.h) * patScale;
          if(el.fillType && el.fillType !== 'solid' && el.fillType !== 'none'){
            var patId = 'shpat' + el.id;
            var defs = document.createElementNS(ns, 'defs');
            defs.appendChild(buildSvgPatternNode(el.fillType, el.fillColor, el.fillColor2, patId, patSx, patSy));
            contentEl.appendChild(defs);
            pathEl.setAttribute('fill', 'url(#' + patId + ')');
          } else if(el.fillType === 'none'){
            pathEl.setAttribute('fill', 'transparent');
          } else {
            pathEl.setAttribute('fill', el.fillColor);
          }
          if(el.strokeWidth > 0){
            pathEl.setAttribute('stroke', el.strokeColor);
            pathEl.setAttribute('stroke-width', el.strokeWidth * (vbW / el.w));
          }
          contentEl.appendChild(pathEl);
        }
        div.appendChild(contentEl);
      }

      if(el.locked){
        div.style.pointerEvents = 'none';
      } else {
        div.addEventListener('pointerdown', function(e){ startDrag(e, el, div, contentEl); });
        div.addEventListener('click', function(e){
          e.stopPropagation();
          if(e.shiftKey){ toggleMultiSelect(el.id); }
          else { setSelectedVisual(el.id); renderSelPanel(); }
        });
      }

      if(el.id === selectedId && !el.locked){ appendHandles(div, el, contentEl); }

      elLayer.appendChild(div);
    });
    updateInkPointerEvents();
  }

  function currentBrushRadius(){

  function startDrag(e, el, div, contentEl){
    e.stopPropagation();

      selectedId = el.id;
      clearMultiSelect();

      div = elLayer.querySelector('[data-id="' + el.id + '"]');
      contentEl = div ? div.firstChild : contentEl;
    }
    var groupIds = getAllSelectedIds().filter(function(id){ return id !== el.id; });
    var groupStarts = groupIds.map(function(id){
      var gEl = curPage().elements.filter(function(x){ return x.id === id; })[0];
      var gDiv = elLayer.querySelector('[data-id="' + id + '"]');
      return gEl ? {el: gEl, div: gDiv, startX: gEl.x, startY: gEl.y} : null;
    }).filter(Boolean);
    var pointerId = e.pointerId;
    var captured = false;
    var start = toInternal(e.clientX, e.clientY);
    var startX = el.x, startY = el.y;
    var moved = false;
    var bboxCx = PAGE_W/2, bboxCy = PAGE_H/2;
    if(el.type === 'ink' && el.contentBBox){
      bboxCx = (el.contentBBox.minX + el.contentBBox.maxX) / 2;
      bboxCy = (el.contentBBox.minY + el.contentBBox.maxY) / 2;
    }
    function onMove(ev){
      var p = toInternal(ev.clientX, ev.clientY);
      var nx = startX + (p.x - start.x);
      var ny = startY + (p.y - start.y);
      if(el.type === 'ink'){
        var deltaX = nx - PAGE_W/2, deltaY = ny - PAGE_H/2;
        var bboxPageX = Math.min(PAGE_W, Math.max(0, bboxCx + deltaX));
        var bboxPageY = Math.min(PAGE_H, Math.max(0, bboxCy + deltaY));
        nx = bboxPageX - bboxCx + PAGE_W/2;
        ny = bboxPageY - bboxCy + PAGE_H/2;
      } else {
        nx = Math.min(PAGE_W, Math.max(0, nx));
        ny = Math.min(PAGE_H, Math.max(0, ny));
      }
      if(!moved && (Math.abs(nx - el.x) > 1.5 || Math.abs(ny - el.y) > 1.5)){
        moved = true;
        if(!captured){ div.setPointerCapture(pointerId); captured = true; }
      }
      if(moved){
        var dx = nx - startX, dy = ny - startY;
        el.x = nx; el.y = ny;
        div.style.left = el.x + 'px';
        div.style.top = el.y + 'px';
        groupStarts.forEach(function(g){
          g.el.x = Math.min(PAGE_W, Math.max(0, g.startX + dx));
          g.el.y = Math.min(PAGE_H, Math.max(0, g.startY + dy));
          if(g.div){ g.div.style.left = g.el.x + 'px'; g.div.style.top = g.el.y + 'px'; }
        });
      }
    }
    function onUp(){
      div.removeEventListener('pointermove', onMove);
      div.removeEventListener('pointerup', onUp);
      if(moved){
        renderElements();
        commit();

        appendHandles(div, el, contentEl);
      }
    }
    div.addEventListener('pointermove', onMove);
    div.addEventListener('pointerup', onUp);
  }

  function attachResizeHandle(handleEl, el, contentEl){
    handleEl.addEventListener('pointerdown', function(e){
      e.stopPropagation();
      if(mode !== 'select') return;
      handleEl.setPointerCapture(e.pointerId);
      var w0, h0, fontSize0;
      if(el.type === 'shape' || el.type === 'photo' || (el.type === 'sticker' && el.isDecor)){ w0 = el.w; h0 = el.h; }
      else if(el.type === 'sticker'){ w0 = h0 = el.size; }
      else if(el.type === 'text'){ fontSize0 = el.fontSize; }
      var rotRad = -el.rotation * Math.PI / 180;
      var startP = toInternal(e.clientX, e.clientY);
      var sdx = startP.x - el.x, sdy = startP.y - el.y;
      var slx = sdx*Math.cos(rotRad) - sdy*Math.sin(rotRad);
      var sly = sdx*Math.sin(rotRad) + sdy*Math.cos(rotRad);
      var startDist = Math.sqrt(slx*slx + sly*sly) || 1;
      function onMove(ev){
        var p = toInternal(ev.clientX, ev.clientY);
        var dx = p.x - el.x, dy = p.y - el.y;
        var lx = dx*Math.cos(rotRad) - dy*Math.sin(rotRad);
        var ly = dx*Math.sin(rotRad) + dy*Math.cos(rotRad);
        if(el.type === 'shape'){
          el.w = Math.max(24, Math.min(1500, Math.abs(lx)*2));
          el.h = Math.max(24, Math.min(1500, Math.abs(ly)*2));
          if(contentEl.tagName && contentEl.tagName.toLowerCase() === 'svg'){
            var livePad = el.strokeWidth > 0 ? Math.ceil(el.strokeWidth / 2) + 1 : 0;
            contentEl.style.width = (el.w + livePad*2) + 'px';
            contentEl.style.height = (el.h + livePad*2) + 'px';
          } else {
            contentEl.style.width = el.w + 'px'; contentEl.style.height = el.h + 'px';
            contentEl.style.borderRadius = el.kind === 'ellipse' ? '50%' : Math.min(el.radius, Math.min(el.w, el.h)/2) + 'px';
          }
        } else {
          var dist = Math.sqrt(lx*lx + ly*ly);
          var factor = dist / startDist;
          if(el.type === 'sticker' && el.isDecor){
            el.w = Math.max(16, Math.min(700, w0*factor));
            el.h = Math.max(16, Math.min(700, h0*factor));
            contentEl.style.transform = 'scale(' + factor + ')';
          } else if(el.type === 'sticker'){
            el.size = Math.max(16, Math.min(400, w0*factor));
            contentEl.style.fontSize = el.size + 'px';
          } else if(el.type === 'photo'){
            el.w = Math.max(20, Math.min(1400, w0*factor));
            el.h = Math.max(20, Math.min(1400, h0*factor));
            if(el.frame === 'cutout' || el.frame === 'none'){ contentEl.style.transform = 'scale(' + factor + ')'; }
            else { var img2 = contentEl.querySelector('img'); if(img2){ img2.style.width = el.w+'px'; img2.style.height = el.h+'px'; } }
          } else if(el.type === 'text'){
            el.fontSize = Math.max(10, Math.min(200, fontSize0*factor));
            contentEl.style.fontSize = el.fontSize + 'px';
          }
        }
      }
      function onUp(){
        handleEl.removeEventListener('pointermove', onMove);
        handleEl.removeEventListener('pointerup', onUp);
        renderElements();
        commit();
      }
      handleEl.addEventListener('pointermove', onMove);
      handleEl.addEventListener('pointerup', onUp);
    });
  }

  function attachRotateHandle(handleEl, el, boxDiv){
    handleEl.addEventListener('pointerdown', function(e){
      e.stopPropagation();

    });
  }

  function reorderLayerByDrop(draggedIdStr, targetId){

      if(String(arr[k].id) === String(draggedIdStr)) di = k;
      if(arr[k].id === targetId) tiOriginal = k;
    }
    if(di < 0 || tiOriginal < 0 || di === tiOriginal) return;
    var movingForward = di < tiOriginal;
    var item = arr.splice(di, 1)[0];
    var ti = -1;

    if(ti < 0){ arr.splice(di, 0, item); return; }
    var insertAt = movingForward ? ti + 1 : ti;
    arr.splice(insertAt, 0, item);
    renderElements(); renderLayerPanel();
    commit();

  // Real stylus pressure (when the device provides it) is used directly.
  // Mice/fingers report a flat 0.5 with no real variation, so for those we
  // fall back to a speed-based width (slower = thicker) to still feel alive.
  function drawPressurePath(ctx, points, baseWidth, color){
    if(points.length === 0) return;
    ctx.save();
    ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle=color; ctx.fillStyle=color;
    if(points.length === 1){
      var w0 = baseWidth * pressureScale(points[0].pressure);
      ctx.beginPath(); ctx.arc(points[0].x, points[0].y, Math.max(0.5,w0/2), 0, Math.PI*2); ctx.fill();
      ctx.restore(); return;
    }
    for(var i=0;i<points.length-1;i++){
      var p0=points[i], p1=points[i+1];
      var factor;
      if(realPressureDetected){
        factor = (pressureScale(p0.pressure)+pressureScale(p1.pressure))/2;
      } else {
        var dist = Math.hypot(p1.x-p0.x, p1.y-p0.y);
        var dt = (p1.t||16) - (p0.t||0);
        factor = velocityScale(dist, dt);
      }
      ctx.lineWidth = Math.max(0.6, baseWidth * factor);
      ctx.beginPath();
      ctx.moveTo(p0.x,p0.y);
      ctx.lineTo(p1.x,p1.y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function compositeStroke(){
    var ctx = activeStrokeLayer.ctx;
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=1;
    ctx.clearRect(0,0,PAGE_W,PAGE_H);
    ctx.drawImage(baseSnapshot,0,0);
    if(toolErase){
      ctx.save();
      ctx.globalCompositeOperation='destination-out';
      ctx.globalAlpha=1;
      drawSmoothPath(ctx, pts, toolWidth, 'rgba(0,0,0,1)');
      ctx.restore();
    } else {
      xctx.clearRect(0,0,PAGE_W,PAGE_H);
      if(toolPressure){ drawPressurePath(xctx, pts, toolWidth, toolColor); }
      else { drawSmoothPath(xctx, pts, toolWidth, toolColor); }
      ctx.globalCompositeOperation='source-over';
      ctx.globalAlpha=toolAlpha;
      ctx.drawImage(scratch,0,0);
      ctx.globalAlpha=1;
    }
  }

  function beginStroke(layer, p){
    isDrawing = true;
    activeStrokeLayer = layer;
    pts = [p];
    bctx.clearRect(0,0,PAGE_W,PAGE_H);
    bctx.drawImage(layer.canvas,0,0);
    if(mode === 'pen'){ toolColor=drawColor; toolWidth=drawWidth; toolAlpha=1; toolErase=false; toolPressure=true; }
    else if(mode === 'highlighter'){ toolColor=drawColor; toolWidth=drawWidth*3+12; toolAlpha=0.38; toolErase=false; toolPressure=false; }
    else if(mode === 'eraser'){ toolWidth=drawWidth*2+14; toolAlpha=1; toolErase=true; toolPressure=false; }
    compositeStroke();
  }
  var SMOOTHING = 0.45;
  function extendStroke(rawP){
    var last = pts[pts.length-1];
    if(last && Math.abs(last.x-rawP.x) < 0.4 && Math.abs(last.y-rawP.y) < 0.4) return;
    var point = rawP;
    if(last && !toolErase){
      point = {
        x: last.x + (rawP.x - last.x) * SMOOTHING,
        y: last.y + (rawP.y - last.y) * SMOOTHING,
        pressure: rawP.pressure,
        t: rawP.t

    }
    pts.push(point);
    compositeStroke();
  }
  function computeInkContentBBox(layer){
    var w = layer.canvas.width, h = layer.canvas.height;
    var data = layer.ctx.getImageData(0, 0, w, h).data;
    var minX = w, minY = h, maxX = 0, maxY = 0, found = false;
    var step = 2;
    for(var y = 0; y < h; y += step){
      var rowOffset = y * w;
      for(var x = 0; x < w; x += step){
        if(data[(rowOffset + x) * 4 + 3] > 10){
          found = true;
          if(x < minX) minX = x;
          if(x > maxX) maxX = x;
          if(y < minY) minY = y;
          if(y > maxY) maxY = y;
        }
      }
    }
    if(!found){ layer.contentBBox = null; return; }
    var pad = 14;
    layer.contentBBox = {
      minX: Math.max(0, minX - pad), minY: Math.max(0, minY - pad),
      maxX: Math.min(w, maxX + pad), maxY: Math.min(h, maxY + pad)
    };
  }

  function endStroke(){
    if(!isDrawing) return;
    isDrawing = false;
    if(activeStrokeLayer){
      activeStrokeLayer.ctx.globalCompositeOperation='source-over';
      activeStrokeLayer.ctx.globalAlpha=1;
      if(toolErase){
        activeStrokeLayer.strokes = [];
      } else {
        activeStrokeLayer.strokes.push({points: pts.slice(), color: toolColor, width: toolWidth, alpha: toolAlpha, pressureEnabled: toolPressure});
      }
      computeInkContentBBox(activeStrokeLayer);
    }
    activeStrokeLayer = null;
    pts = [];
    renderElements();
    commit();
  }

  function replayLayerStrokes(layer){
    layer.ctx.clearRect(0,0,PAGE_W,PAGE_H);
    layer.strokes.forEach(function(s){
      layer.ctx.globalCompositeOperation = 'source-over';
      layer.ctx.globalAlpha = s.alpha;
      if(s.pressureEnabled){ drawPressurePath(layer.ctx, s.points, s.width, s.color); }

  function pointToSegmentDist(px,py,x1,y1,x2,y2){
    var dx = x2-x1, dy = y2-y1;
    var lenSq = dx*dx + dy*dy;
    var t = lenSq > 0 ? Math.max(0, Math.min(1, ((px-x1)*dx + (py-y1)*dy)/lenSq)) : 0;
    var cx = x1 + t*dx, cy = y1 + t*dy;

  function strokeHitTest(stroke, px, py){

    }
    for(var i=0; i<stroke.points.length-1; i++){
      var p0 = stroke.points[i], p1 = stroke.points[i+1];
      if(pointToSegmentDist(px, py, p0.x, p0.y, p1.x, p1.y) <= threshold) return true;
    }
    return false;
  }

    }
  }

  function attachCurvePointDrag(circle, index){

  // html2canvas has weak support for SVG <pattern> fills and CSS conic-gradient,
  // which is why patterned/svg shapes could vanish from the downloaded image.
  // We render each shape onto its own small canvas first and swap that in as a
  // plain <img> just before capture, then swap the live version back after.
  function roundRectPath(ctx, x, y, w, h, r){
    r = Math.max(0, Math.min(r, w/2, h/2));
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }
  function buildCanvasPatternTile(fillType, color1, color2, patternSize){
    var ps = patternSize || 1;

      size = 28*ps;
      tile = document.createElement('canvas'); tile.width = size; tile.height = size;
      tctx = tile.getContext('2d');
      tctx.fillStyle = color2; tctx.fillRect(0,0,size,size);
      tctx.fillStyle = color1; tctx.fillRect(0,0,size,size/2);
    } else if(fillType === 'dot'){
      size = 20*ps;
      tile = document.createElement('canvas'); tile.width = size; tile.height = size;
      tctx = tile.getContext('2d');
      tctx.fillStyle = color2; tctx.fillRect(0,0,size,size);
      tctx.fillStyle = color1; tctx.beginPath(); tctx.arc(size/2,size/2,4*ps,0,Math.PI*2); tctx.fill();
    } else if(fillType === 'polka'){
      size = 38*ps;
      tile = document.createElement('canvas'); tile.width = size; tile.height = size;
      tctx = tile.getContext('2d');
      tctx.fillStyle = color2; tctx.fillRect(0,0,size,size);
      tctx.fillStyle = color1;
      [[size/2,size/2],[0,0],[size,0],[0,size],[size,size]].forEach(function(p){

  // ---------- serialize / deserialize (for autosave + undo history) ----------
  function serializeElement(el){
    if(el.type === 'ink'){ return {id:el.id, type:'ink', name:el.name, x:el.x, y:el.y, rotation:el.rotation, strokes: el.strokes, dataURL: el.canvas.toDataURL('image/png')}; }
    if(el.type === 'photo'){
      var clone = {};
      for(var k in el){ if(k !== 'imgObj' && k !== '_cutoutCanvas' && k !== '_cutoutKey'){ clone[k] = el[k]; } }
      return clone;
    }
    if(el.type === 'sticker' && el.isDecor){
      var clone2 = {};
      for(var k2 in el){ if(k2 !== '_decorCanvas' && k2 !== '_decorKey'){ clone2[k2] = el[k2]; } }
      return JSON.parse(JSON.stringify(clone2));
    }
    return JSON.parse(JSON.stringify(el, function(k, v){
      return (k === '_sampleShapeCanvas' || k === '_sampleShapeKey' || k === '_sampleTextCanvas' || k === '_sampleTextKey') ? undefined : v;
    }));
  }
  function serializeState(){
    return {

      })
    };
  }
  function deserializeElement(data, onReady){
    if(data.type === 'ink'){
      var layer = makeInkLayer();
      layer.id = data.id;
      layer.x = data.x != null ? data.x : PAGE_W/2;
      layer.y = data.y != null ? data.y : PAGE_H/2;
      layer.rotation = data.rotation || 0;
      layer.name = data.name || null;
      layer.strokes = data.strokes || [];
      if(data.dataURL){
        var img = new Image();
        img.onload = function(){ layer.ctx.drawImage(img,0,0); computeInkContentBBox(layer); if(onReady) onReady(); };
        img.src = data.dataURL;
      }
      return layer;
    }
    if(data.type === 'photo'){
      var clone = {};
      for(var k in data){ clone[k] = data[k]; }
      clone.imgObj = null;
      var img2 = new Image();
      img2.onload = function(){ clone.imgObj = img2; if(onReady) onReady(); };
      img2.src = clone.src;
      return clone;
    }
    return JSON.parse(JSON.stringify(data));
  }

    });
    restoredPages.forEach(function(p){
      p.elements.forEach(function(el){
        if(typeof el.id === 'number' && el.id >= idCounter){ idCounter = el.id + 1; }
      });

    pages = restoredPages;
    currentPage = Math.min(data.currentPage || 0, pages.length - 1);

        clipboardEl = JSON.parse(JSON.stringify(el, function(k, v){
          return (k === 'imgObj' || k === '_cutoutCanvas' || k === '_cutoutKey' || k === '_decorCanvas' || k === '_decorKey' || k === '_sampleShapeCanvas' || k === '_sampleShapeKey' || k === '_sampleTextCanvas' || k === '_sampleTextKey') ? undefined : v;
        }));
        clipboardEl._imgObjRef = imgObjRef;
      }
      return;
    }
    if(key === 'v'){
      if(isEditableFocus) return;
      // handled in the 'paste' event listener below, which can also see clipboardData
      // for external images — calling preventDefault() here would suppress that event
      return;
    }
  });

  document.addEventListener('keydown', function(e){
    if(e.key !== 'Delete' && e.key !== 'Backspace') return;
    var ae = document.activeElement;
    var isEditableFocus = ae && (ae.isContentEditable || ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA');
    var allSelected = getAllSelectedIds();
    if(isEditableFocus || allSelected.length === 0) return;
    var idsToDelete = allSelected.filter(function(id){
      var el = curPage().elements.filter(function(x){ return x.id === id; })[0];
      return el && !el.locked;
    });
    if(idsToDelete.length === 0) return;
    e.preventDefault();
    curPage().elements = curPage().elements.filter(function(x){ return idsToDelete.indexOf(x.id) === -1; });
    selectedId = null;
    clearMultiSelect();
    renderElements(); renderSelPanel(); renderLayerPanel();
    commit();
  });

  // ---------- theme (outer UI only, does not affect the diary page itself) ----------
  var themeSelect = document.getElementById('themeSelect');
  function applyTheme(name){
    document.documentElement.setAttribute('data-theme', name);
    themeSelect.value = name;
    try{ localStorage.setItem(THEME_KEY, name); } catch(err){ /* ignore */ }
  }
  themeSelect.addEventListener('change', function(){ applyTheme(themeSelect.value); });

  // ---------- init ----------
  renderCategoryTabs();
  renderStickerGrid();
  updateScale();
  var savedTheme = 'pink';
  try{ savedTheme = localStorage.getItem(THEME_KEY) || 'pink'; } catch(err){ /* ignore */ }
  applyTheme(savedTheme);
  loadPressureCurve();
  loadFromStorage().then(function(loaded){
    if(!loaded){
      pages = [makePage()];
      currentPage = 0;
    }
    selectedId = null;
    renderAllPage();
    setMode('select');
    pushHistory();
  });
})();
</script>
</body>
</html>
